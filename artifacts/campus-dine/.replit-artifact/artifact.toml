kind = "web"
previewPath = "/"
title = "Campus Dine"
version = "1.0.0"
id = "artifacts/campus-dine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21988

[services.development]
run = "pnpm --filter @workspace/campus-dine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-dine", "run", "build" ]
publicDir = "artifacts/campus-dine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21988"
BASE_PATH = "/"
